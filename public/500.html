<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <title>일시적인 오류가 발생했습니다 · COOA</title>
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <style>
      /* 정적 파일 — asset pipeline 미의존. 색상은 COOA 토큰(application.css)과 동일한 값을 인라인. */
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      :root {
        --cooa: #8e0300; --ink: #3d3d3d; --line: #a3a3a3; --line-soft: #d9d9d9;
        --tint: #f5f5f5; --bg: #ffffff;
      }
      html { font-size: 16px; }
      body {
        min-height: 100dvh; display: grid; place-items: center; padding: 2rem;
        background: var(--bg); color: var(--ink); line-height: 1.5; letter-spacing: -0.01em;
        font-family: "Pretendard Variable", Pretendard, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
      }
      main { width: min(100%, 26rem); text-align: center; }
      .brand { font-size: 1.5rem; font-weight: 800; color: var(--cooa); letter-spacing: -0.02em; }
      .code { margin-top: 2rem; font-size: 4rem; font-weight: 800; color: var(--cooa); line-height: 1; font-variant-numeric: tabular-nums; }
      h1 { margin-top: 1rem; font-size: 1.25rem; font-weight: 700; color: var(--ink); }
      p { margin-top: 0.75rem; font-size: 0.9375rem; color: var(--line); }
      .home {
        display: inline-block; margin-top: 1.75rem; padding: 0.7rem 1.4rem; border-radius: 0.75rem;
        background: linear-gradient(to bottom, #8e0300, #280100); color: #fff;
        font-size: 0.9375rem; font-weight: 600; text-decoration: none;
      }
      .home:hover { opacity: 0.92; }
    </style>
  </head>
  <body>
    <!-- This file lives in public/500.html -->
    <main>
      <div class="brand">COOA</div>
      <div class="code">500</div>
      <h1>일시적인 오류가 발생했습니다</h1>
      <p>서버에서 문제가 발생했습니다. 잠시 후 다시 시도해 주세요. 문제가 계속되면 관리자에게 문의해 주세요.</p>
      <a class="home" href="/">홈으로 돌아가기</a>
    </main>
  </body>
</html>

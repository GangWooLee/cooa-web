# PostgreSQL — COOA primary DB (multi-tenant + RLS).
# Phase 0a: single role (OS superuser) to validate PG conversion.
# Phase 0b: app runs as non-owner `cooa_app` (NO BYPASSRLS); migrations as `cooa_migrator`
#           via COOA_DB_USER override. See ADR-002 §7.1 / ADR-003 P1.
default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("COOA_DB_HOST", "localhost") %>
  username: <%= ENV.fetch("COOA_DB_USER") { ENV["USER"] } %>
  password: <%= ENV.fetch("COOA_DB_PASSWORD", "") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: cooa_development

# test DB is scratch — wiped/regenerated by the suite.
test:
  <<: *default
  database: cooa_test

# Production: primary + solid_* (cache/queue/cable) as separate Postgres DBs
# (dev/test don't use solid_* against the DB — cache=memory/null, cable=async/test).
production:
  primary:
    <<: *default
    database: cooa_production
  cache:
    <<: *default
    database: cooa_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: cooa_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: cooa_production_cable
    migrations_paths: db/cable_migrate

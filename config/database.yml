# PostgreSQL — COOA primary DB (multi-tenant + RLS).
# Phase 2a-2: the app RUNTIME connects as cooa_app (NO BYPASSRLS) so RLS is enforced end-to-end.
# Migrations/seed/grant run as the OWNER via COOA_DB_USER override (which WINS over the cooa_app default).
# The test suite stays on the owner (the regression suite relies on owner cross-cutting setup; RLS is
# proven separately by the cooa_app e2e smoke). See ADR-002 §7.1 / ADR-003 P1.
default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("COOA_DB_HOST", "localhost") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

# App runtime = cooa_app. When COOA_DB_USER is set (migrations/seed/grant), it overrides → owner.
app_role: &app_role
  username: <%= ENV.fetch("COOA_DB_USER") { ENV.fetch("COOA_APP_USER", "cooa_app") } %>
  password: <%= ENV["COOA_DB_USER"] ? ENV.fetch("COOA_DB_PASSWORD", "") : ENV.fetch("COOA_APP_PASSWORD", "cooa_dev_pw") %>

development:
  <<: [*default, *app_role]
  database: cooa_development

# test DB is scratch; kept on the OWNER so the suite's cross-cutting setup works (RLS via e2e smoke).
test:
  <<: *default
  database: cooa_test
  username: <%= ENV["USER"] %>
  password: ""

production:
  primary:
    <<: [*default, *app_role]
    database: cooa_production
  cache:
    <<: [*default, *app_role]
    database: cooa_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: [*default, *app_role]
    database: cooa_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: [*default, *app_role]
    database: cooa_production_cable
    migrations_paths: db/cable_migrate

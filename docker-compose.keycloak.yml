# Phase 2b-2 — local Keycloak for OIDC (run only when docker is available; not used by dev/test by default).
#
#   docker compose -f docker-compose.keycloak.yml up
#   open http://localhost:8080/realms/cooa/.well-known/openid-configuration   # verify discovery
#
# Then point the Rails app at it (these enable the OmniAuth provider + the "Keycloak로 로그인" button):
#   export KC_ISSUER=http://localhost:8080/realms/cooa
#   export KC_CLIENT_ID=cooa-rails
#   export KC_CLIENT_SECRET=cooa-rails-dev-secret          # = realm-cooa.json client "secret" (dev only)
#   export KC_REDIRECT_URI=http://localhost:3000/auth/openid_connect/callback
#   bin/dev                                                 # app runtime = cooa_app (RLS)
#
# Demo users (realm-cooa.json): kim/song/lee/park @cooa.dev, password "demo1234" — emails match the
# Rails seed, so the first OIDC login links by email and binds the IdP subject (roles preserved).
# `down -v` resets the in-memory (H2) realm state.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin       # Keycloak 26 renamed KEYCLOAK_ADMIN → KC_BOOTSTRAP_ADMIN_*
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-cooa.json:/opt/keycloak/data/import/realm-cooa.json:ro
